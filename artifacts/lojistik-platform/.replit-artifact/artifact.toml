kind = "web"
previewPath = "/"
title = "Lojistik Platform"
version = "1.0.0"
id = "artifacts/lojistik-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19983

[services.development]
run = "pnpm --filter @workspace/lojistik-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lojistik-platform", "run", "build" ]
publicDir = "artifacts/lojistik-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19983"
BASE_PATH = "/"
